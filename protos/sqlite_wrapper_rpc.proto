syntax = "proto3";

package sqlite_wrapper;

//
// The SQLiteWrapper gRPC Service exposes methods to open/close databases,
// execute SQL commands, query data, update/insert/delete records,
// get/set database versions, and even watch for changes via server streaming.
//

service SqliteWrapperService {
  // Opens (or creates) a database.
  rpc OpenDB(OpenDBRequest) returns (OpenDBResponse);

  // Closes an open database.
  rpc CloseDB(CloseDBRequest) returns (CloseDBResponse);

  // Executes a SQL command (such as INSERT, UPDATE, DELETE).
  rpc Execute(SqlQueryRequest) returns (SqlQueryResponse);

  // Executes a SELECT query.
  rpc Select(SqlQueryRequest) returns (SqlQueryResponse);

  // Executes a batch of SQL commands in a single round-trip.
  rpc ExecuteBatch(BatchRequest) returns (BatchResponse);

  // Retrieves the database user_version.
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);

  // Sets the database user_version.
  rpc SetVersion(SetVersionRequest) returns (SetVersionResponse);

  rpc Echo(EchoRequest) returns (EchoResponse);

  // Watches a query for real-time updates.
  // This is a server-streaming RPC where the server will push new results.
  rpc Watch(WatchRequest) returns (stream WatchResponse);

  // Exports the entire database file as bytes (backup).
  rpc ExportBackup(ExportBackupRequest) returns (ExportBackupResponse);

  // Imports a database file from bytes (restore).
  rpc ImportBackup(ImportBackupRequest) returns (ImportBackupResponse);

  // Exports query results as CSV.
  rpc ExportCSV(ExportCSVRequest) returns (ExportCSVResponse);
}

// ==================== Core types ====================

// Compact parameter representation (replaces google.protobuf.Any).
message Param {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    bytes bytes_value = 5;
    // null is represented by no field set in the oneof.
  }
}

// A single value returned in query results.
message Value {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    bytes bytes_value = 5;
  }
}

// A single column in a result row.
message Column {
  string name = 1;
  Value value = 2;
}

// A single row of query results.
message Row {
  repeated Column columns = 1;
}

// ==================== Database Connection Operations ====================

message OpenDBRequest {
  // The target version (if needed for migration).
  int32 version = 1;
  // An optional name for the database.
  string dbName = 2;
}

message OpenDBResponse {
  // Indicates if the database was created (true) or already existed (false).
  bool created = 1;
  // The version of the database.
  int32 version = 2;
  // The SQLite engine version.
  string sqliteVersion = 3;
  // The database name.
  string dbName = 4;
}

message CloseDBRequest {
  // The name of the database to close.
  string dbName = 1;
}

message CloseDBResponse {
  // Indicates if the operation succeeded.
  bool success = 1;
}

// ==================== Query & Command Operations ====================

// Used for both executing commands (INSERT/UPDATE/DELETE) and queries.
message SqlQueryRequest {
  // The SQL statement to execute.
  string sql = 1;
  // Parameters for the SQL statement (compact oneof instead of Any).
  repeated Param params = 2;
  // The database name to use.
  string dbName = 3;
  // Tables that are watched/modified by this request.
  repeated string tables = 4;
}

message SqlQueryResponse {
  // For SELECT: the resulting rows.
  repeated Row rows = 1;
  // For INSERT/UPDATE/DELETE: a single scalar result
  // (last_insert_rowid, changes, etc.).
  Value result = 2;
}

// ==================== Batching ====================

message BatchRequest {
  repeated SqlQueryRequest requests = 1;
}

message BatchResponse {
  repeated SqlQueryResponse responses = 1;
}

// ==================== Watch ====================

message WatchRequest {
  string sql = 1;
  repeated Param params = 2;
  string dbName = 3;
  repeated string tables = 4;
  bool singleResult = 5;
}

message WatchResponse {
  repeated Row rows = 1;
  Value result = 2;
  bool singleResult = 3;
}

// ==================== Database Versioning Operations ====================

message GetVersionRequest {
  string dbName = 1;
}

message GetVersionResponse {
  int32 version = 1;
}

message SetVersionRequest {
  string dbName = 1;
  int32 version = 2;
}

message SetVersionResponse {
  bool success = 1;
}

// ==================== Echo ====================

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

// ==================== Export/Backup Operations ====================

message ExportBackupRequest {
  // The database name to export.
  string dbName = 1;
}

message ExportBackupResponse {
  // The raw database file content.
  bytes data = 1;
}

message ImportBackupRequest {
  // The database name to import into.
  string dbName = 1;
  // The raw database file content to restore.
  bytes data = 2;
}

message ImportBackupResponse {
  // Whether the import succeeded.
  bool success = 1;
  // A human-readable message in case of failure.
  string message = 2;
}

message ExportCSVRequest {
  // The database name to query.
  string dbName = 1;
  // The SQL query to execute (client-built with locale suffixes).
  string sql = 2;
}

message ExportCSVResponse {
  // The CSV file content.
  bytes data = 1;
}
