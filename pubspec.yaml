name: sqlite_wrapper
description: A simple way to easily use the SQLite library (even in a reactive way)
version: 0.3.0
homepage: https://github.com/stefalda/sqlite_wrapper
issue_tracker: https://github.com/stefalda/sqlite_wrapper/issues

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  sqlite3: ^2.7.3
  sqflite_common_ffi_web: "^0.4.5+4"
  # Remote procedure call support
  grpc: ^4.0.1
  fixnum: ^1.1.1
  protobuf: ^3.1.0
  #build_grpc_channel: ^0.5.0

dev_dependencies:
  flutter_lints: ^5.0.0
  test: ^1.25.15
